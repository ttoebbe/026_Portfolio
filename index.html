<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #111;
        color: #fff;
        font-family: system-ui, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .construction-card {
        border: 3px solid #f5c518;
        border-radius: 12px;
        padding: 3rem 2.5rem;
        text-align: center;
        max-width: 480px;
        width: 100%;
      }

      .construction-card__icon {
        font-size: 4rem;
        line-height: 1;
        margin-bottom: 1.5rem;
      }

      .construction-card__heading {
        font-size: 2rem;
        font-weight: 700;
        color: #f5c518;
        letter-spacing: 0.04em;
        margin-bottom: 1rem;
      }

      .construction-card__text {
        font-size: 1.125rem;
        color: #ccc;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="construction-card">
        <div class="construction-card__icon" aria-hidden="true">🚧</div>
        <h1 class="construction-card__heading">Under Construction</h1>
        <p class="construction-card__text">
          We're working on something awesome.<br />Check back soon!
        </p>
      </div>
    </main>
  </body>
</html>
